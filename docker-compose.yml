services:
  app:
    build: .
    ports:
      - "${APP_PORT:-18065}:3001"
    volumes:
      - app-data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3001
      - SEED_ON_STARTUP=true
    healthcheck:
      test: ["CMD", "node", "--input-type=module", "-e", "const r = await fetch('http://localhost:3001/api/health'); process.exit(r.ok ? 0 : 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

volumes:
  app-data:
